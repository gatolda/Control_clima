# Configuracion del sistema de control climatico

general:
  nombre_sistema: "Control Climatico Invernadero"
  ubicacion: "Invernadero Principal"
  intervalo_lectura: 5

# Sensores organizados por variable
# Cada variable puede tener multiples fuentes
sensores:
  temperatura:
    - id: "dht22_1"
      tipo: DHT22
      pin: 4
      ubicacion: "centro"

  humedad:
    - id: "dht22_1"
      tipo: DHT22
      pin: 4
      ubicacion: "centro"

  co2:
    - id: "mhz19d_1"
      tipo: CO2_PWM
      pin: 11
      ubicacion: "centro"

  # Futuro: Arduino para humedad de suelo
  # humedad_suelo:
  #   - id: "arduino_suelo_1"
  #     tipo: ARDUINO_SERIAL
  #     puerto: "/dev/ttyUSB0"
  #     plantas: 15

# Actuadores
actuadores:
  # Pines BOARD verificados (modulo 8 reles)
  # Rele 1=pin37, 2=pin35, 3=pin33, 4=pin31, 5=pin29, 6=pin32, 7=pin36, 8=pin38
  pines:
    ventiladores: 37       # Rele 1
    filtro_carbon: 35      # Rele 2
    intractor: 33          # Rele 3
    humidificador: 31      # Rele 4
    deshumidificador: 29   # Rele 5
    luz: 32                # Rele 6
    calefactor: 36         # Rele 7
    aire_acondicionado: 38 # Rele 8
  tipo_activacion: "activo_bajo"

  # Pares que NUNCA deben estar activos al mismo tiempo
  conflictos:
    - [calefactor, aire_acondicionado]
    - [humidificador, deshumidificador]

  # Ozono solo cuando todo lo demas esta apagado
  ozono_exclusivo: true

# Escalamiento energetico: orden de prioridad
escalamiento:
  temperatura_alta:
    - ventiladores
    - intractor
    - aire_acondicionado
  temperatura_baja:
    - calefactor
  humedad_alta:
    - ventiladores
    - intractor
    - deshumidificador
  humedad_baja:
    - humidificador
  co2_alto:
    - ventiladores
    - intractor

# Histeresis: margen antes de apagar (evita oscilar)
histeresis:
  temperatura: 1.5
  humedad: 5.0
  co2: 50
  tiempo_minimo: 180
