# Configuracion del sistema de control climatico

general:
  nombre_sistema: "Control Climatico Invernadero"
  ubicacion: "Invernadero Principal"
  intervalo_lectura: 5

# Sensores organizados por variable
# Cada variable puede tener multiples fuentes
sensores:
  temperatura:
    - id: "dht22_1"
      tipo: DHT22
      pin: 4
      ubicacion: "centro"

  humedad:
    - id: "dht22_1"
      tipo: DHT22
      pin: 4
      ubicacion: "centro"

  co2:
    - id: "mhz19d_1"
      tipo: CO2_PWM
      pin: 11
      ubicacion: "centro"

  # Futuro: Arduino para humedad de suelo
  # humedad_suelo:
  #   - id: "arduino_suelo_1"
  #     tipo: ARDUINO_SERIAL
  #     puerto: "/dev/ttyUSB0"
  #     plantas: 15

# Actuadores
actuadores:
  pines:
    ventiladores: 12
    filtro_carbon: 13
    intractor: 15
    humidificador: 16
    deshumidificador: 18
    luz: 22
    calefactor: 29
    aire_acondicionado: 31
    ozono: 33
  tipo_activacion: "activo_bajo"

  # Pares que NUNCA deben estar activos al mismo tiempo
  conflictos:
    - [calefactor, aire_acondicionado]
    - [humidificador, deshumidificador]

  # Ozono solo cuando todo lo demas esta apagado
  ozono_exclusivo: true

# Escalamiento energetico: orden de prioridad
escalamiento:
  temperatura_alta:
    - ventiladores
    - intractor
    - aire_acondicionado
  temperatura_baja:
    - calefactor
  humedad_alta:
    - ventiladores
    - intractor
    - deshumidificador
  humedad_baja:
    - humidificador
  co2_alto:
    - ventiladores
    - intractor

# Histeresis: margen antes de apagar (evita oscilar)
histeresis:
  temperatura: 1.5
  humedad: 5.0
  co2: 50
  tiempo_minimo: 180
