# Configuracion del sistema de control climatico

general:
  nombre_sistema: "Control Climatico Invernadero"
  ubicacion: "Invernadero Principal"
  intervalo_lectura: 5

# Sensores organizados por variable
# Cada variable puede tener multiples fuentes
sensores:
  temperatura:
    - id: "dht22_1"
      tipo: ARDUINO_SERIAL
      arduino_field: "temperature"
      ubicacion: "canopy"
    - id: "dht22_2"
      tipo: ARDUINO_SERIAL
      arduino_field: "temperature"
      ubicacion: "canopy"

  humedad:
    - id: "dht22_1"
      tipo: ARDUINO_SERIAL
      arduino_field: "humidity"
      ubicacion: "canopy"
    - id: "dht22_2"
      tipo: ARDUINO_SERIAL
      arduino_field: "humidity"
      ubicacion: "canopy"

  co2:
    - id: "mhz19_1"
      tipo: ARDUINO_SERIAL
      arduino_field: "co2"
      ubicacion: "centro"

  humedad_suelo:
    - id: "soil_s1"
      tipo: ARDUINO_SERIAL
      arduino_field: "humidity"
      zona: "zona_1"

  iluminacion:
    # Sensor digital LDR (KY-018) en D7 del Arduino. Cross-check de que el LED
    # este realmente prendido cuando el schedule dice ON. Valor binario: 1=luz
    # detectada, 0=oscuro. No mide lux ni intensidad.
    - id: "light_1"
      tipo: ARDUINO_SERIAL
      arduino_field: "light_detected"
      ubicacion: "canopy"


# Arduino hub
arduino:
  puerto: "/dev/arduino-soil"
  baudrate: 115200
  timeout: 2

# Actuadores
actuadores:
  # Pines BOARD verificados (modulo 8 reles)
  # Rele 1=pin37, 2=pin35, 3=pin33, 4=pin31, 5=pin29, 6=pin32, 7=pin36, 8=pin38
  pines:
    ventiladores: 26       # Rele 1
    filtro_carbon: 19      # Rele 2
    intractor: 13          # Rele 3
    humidificador: 6      # Rele 4
    deshumidificador: 5   # Rele 5
    luz: 12                # Rele 6
    calefactor: 16         # Rele 7
    aire_acondicionado: 20 # Rele 8
  tipo_activacion: "activo_bajo"

  # Pares que NUNCA deben estar activos al mismo tiempo
  conflictos:
    - [calefactor, aire_acondicionado]
    - [humidificador, deshumidificador]

  # Ozono solo cuando todo lo demas esta apagado
  ozono_exclusivo: true

# Escalamiento energetico: orden de prioridad
escalamiento:
  temperatura_alta:
    - ventiladores
    - intractor
    - aire_acondicionado
  temperatura_baja:
    - calefactor
  humedad_alta:
    - ventiladores
    - intractor
    - deshumidificador
  humedad_baja:
    - humidificador
  co2_alto:
    - ventiladores
    - intractor

# Sistema de riego (habilitar cuando haya hardware)
riego:
  habilitado: false
  zonas: []
  # Ejemplo de zona configurada:
  # zonas:
  #   - id: "zona_1"
  #     nombre: "Mesa Norte"
  #     valvula: "valvula_zona_1"     # nombre en actuadores.pines
  #     plantas: [1, 2, 3, 4, 5]
  #     sensor_humedad: "suelo_h_1"
  #     sensores_humedad: ["suelo_h_1", "suelo_h_2"]
  #     sensor_ph: "suelo_ph_1"
  #     programacion:
  #       - hora: "08:00"
  #         duracion_minutos: 5
  #       - hora: "14:00"
  #         duracion_minutos: 3
  #       - hora: "20:00"
  #         duracion_minutos: 5
  #     umbrales:
  #       humedad_minima: 40
  #       humedad_skip: 65
  #       ph_min: 5.5
  #       ph_max: 7.0
  #       duracion_maxima_minutos: 15

# Camara USB UVC (Logitech C270 en /dev/video0). 960x720 da mejor balance
# entre nitidez y peso del archivo para el analisis IA con Claude Vision.
camara:
  habilitada: true
  resolucion: [960, 720]
  intervalo_minutos: 60
  # Requiere: ANTHROPIC_API_KEY en .env para analisis IA

# Histeresis: margen antes de apagar (evita oscilar)
histeresis:
  temperatura: 1.5
  humedad: 5.0
  co2: 50
  tiempo_minimo: 180
