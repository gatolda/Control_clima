# Configuracion del sistema de control climatico

general:
  nombre_sistema: "Control Climatico Invernadero"
  ubicacion: "Invernadero Principal"
  intervalo_lectura: 5

# Sensores organizados por variable
# Cada variable puede tener multiples fuentes
sensores:
  temperatura:
    - id: "dht22_1"
      tipo: DHT22
      pin: 4
      ubicacion: "centro"

  humedad:
    - id: "dht22_1"
      tipo: DHT22
      pin: 4
      ubicacion: "centro"

  co2:
    - id: "mhz19d_1"
      tipo: CO2_PWM
      pin: 11
      ubicacion: "centro"

  # Sensores de suelo via Arduino (habilitar cuando haya hardware)
  # humedad_suelo:
  #   - id: "suelo_h_1"
  #     tipo: ARDUINO_SERIAL
  #     puerto: "/dev/ttyUSB0"
  #     zona: "zona_1"
  #   - id: "suelo_h_2"
  #     tipo: ARDUINO_SERIAL
  #     puerto: "/dev/ttyUSB0"
  #     zona: "zona_1"
  #   - id: "suelo_h_3"
  #     tipo: ARDUINO_SERIAL
  #     puerto: "/dev/ttyUSB0"
  #     zona: "zona_2"
  #
  # ph_suelo:
  #   - id: "suelo_ph_1"
  #     tipo: ARDUINO_SERIAL
  #     puerto: "/dev/ttyUSB0"
  #     zona: "zona_1"
  #   - id: "suelo_ph_2"
  #     tipo: ARDUINO_SERIAL
  #     puerto: "/dev/ttyUSB0"
  #     zona: "zona_2"

# Arduino hub (habilitar cuando haya hardware)
# arduino:
#   puerto: "/dev/ttyUSB0"
#   baudrate: 115200
#   timeout: 2

# Actuadores
actuadores:
  # Pines BOARD verificados (modulo 8 reles)
  # Rele 1=pin37, 2=pin35, 3=pin33, 4=pin31, 5=pin29, 6=pin32, 7=pin36, 8=pin38
  pines:
    ventiladores: 37       # Rele 1
    filtro_carbon: 35      # Rele 2
    intractor: 33          # Rele 3
    humidificador: 31      # Rele 4
    deshumidificador: 29   # Rele 5
    luz: 32                # Rele 6
    calefactor: 36         # Rele 7
    aire_acondicionado: 38 # Rele 8
  tipo_activacion: "activo_bajo"

  # Pares que NUNCA deben estar activos al mismo tiempo
  conflictos:
    - [calefactor, aire_acondicionado]
    - [humidificador, deshumidificador]

  # Ozono solo cuando todo lo demas esta apagado
  ozono_exclusivo: true

# Escalamiento energetico: orden de prioridad
escalamiento:
  temperatura_alta:
    - ventiladores
    - intractor
    - aire_acondicionado
  temperatura_baja:
    - calefactor
  humedad_alta:
    - ventiladores
    - intractor
    - deshumidificador
  humedad_baja:
    - humidificador
  co2_alto:
    - ventiladores
    - intractor

# Sistema de riego (habilitar cuando haya hardware)
riego:
  habilitado: false
  zonas: []
  # Ejemplo de zona configurada:
  # zonas:
  #   - id: "zona_1"
  #     nombre: "Mesa Norte"
  #     valvula: "valvula_zona_1"     # nombre en actuadores.pines
  #     plantas: [1, 2, 3, 4, 5]
  #     sensor_humedad: "suelo_h_1"
  #     sensores_humedad: ["suelo_h_1", "suelo_h_2"]
  #     sensor_ph: "suelo_ph_1"
  #     programacion:
  #       - hora: "08:00"
  #         duracion_minutos: 5
  #       - hora: "14:00"
  #         duracion_minutos: 3
  #       - hora: "20:00"
  #         duracion_minutos: 5
  #     umbrales:
  #       humedad_minima: 40
  #       humedad_skip: 65
  #       ph_min: 5.5
  #       ph_max: 7.0
  #       duracion_maxima_minutos: 15

# Camara (habilitar cuando haya hardware)
camara:
  habilitada: false
  resolucion: [1920, 1080]
  intervalo_minutos: 60
  # Requiere: ANTHROPIC_API_KEY en .env para analisis IA

# Histeresis: margen antes de apagar (evita oscilar)
histeresis:
  temperatura: 1.5
  humedad: 5.0
  co2: 50
  tiempo_minimo: 180
