<!DOCTYPE html>
<html lang="es" data-theme="dark" data-density="normal"{% if user.is_authenticated %} data-role="{{ user.role }}"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario — Control Climatico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
    <meta name="theme-color" content="#0a0a0b">
    <script>
        (function() {
            const t = localStorage.getItem('theme');
            const d = localStorage.getItem('density');
            if (t) document.documentElement.setAttribute('data-theme', t);
            if (d) document.documentElement.setAttribute('data-density', d);
        })();
    </script>
</head>
<body>
<div class="app-shell">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-logo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
            </div>
            <div class="sidebar-brand-text">
                <div class="sidebar-brand-title">Control Climatico</div>
                <div class="sidebar-brand-subtitle">Invernadero</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="sidebar-nav-section">Monitoreo</div>
            <a href="/" class="nav-item">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="/calendar" class="nav-item active">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Calendario</span>
            </a>
            <a href="/cycles" class="nav-item">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                <span>Ciclos</span>
            </a>
            <a href="/diagnostics" class="nav-item">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                <span>Diagnosticos</span>
            </a>

            <div class="sidebar-nav-section">Configuracion</div>
            <a href="/inventory" class="nav-item">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                <span>Inventario</span>
            </a>
            <a href="/settings" class="nav-item">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                <span>Ajustes</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            {% if user.is_authenticated %}
            <span class="role-chip role-{{ user.role }}" title="{{ user.username }} ({{ user.role }})">{{ user.role }}</span>
            {% endif %}
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Calendario de Cultivo</h1>
                <div class="page-subtitle">Tracking del ciclo, eventos pasados y proximos</div>
            </div>
        </div>

        <div id="cycle-container">
            <div class="empty-state">Cargando...</div>
        </div>
    </main>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const CAN_WRITE = {{ 'true' if user.is_authenticated and user.can_write else 'false' }};

const TYPE_LABELS = {
    abono: "Abono",
    poda: "Poda",
    defoliacion: "Defoliacion",
    transplante: "Transplante",
    plaga: "Plaga",
    fase_cambio: "Cambio de fase",
    otro: "Otro",
};

function loadCycle() {
    fetch('/api/cycle/current')
        .then(r => r.json())
        .then(data => {
            const c = document.getElementById('cycle-container');
            if (!data.active) {
                c.innerHTML = renderNoCycle();
                wireNoCycle();
                return;
            }
            c.innerHTML = renderActiveCycle(data);
            wireActiveCycle();
            loadEvents();
            loadFeeds();
            loadPhotos();
            loadPlants();
            loadRecurring();
            loadCosts();
            // Pre-llenar campos de cosecha si existen
            if (data.cycle.harvest_wet_g != null) document.getElementById('harv-wet').value = data.cycle.harvest_wet_g;
            if (data.cycle.harvest_dry_g != null) document.getElementById('harv-dry').value = data.cycle.harvest_dry_g;
            if (data.cycle.harvest_cured_g != null) document.getElementById('harv-cured').value = data.cycle.harvest_cured_g;
            if (data.cycle.harvest_notes) document.getElementById('harv-notes').value = data.cycle.harvest_notes;
            if (data.cycle.harvest_date) document.getElementById('harv-date').value = data.cycle.harvest_date;
        })
        .catch(() => {
            document.getElementById('cycle-container').innerHTML =
                '<div class="empty-state">Error al cargar el ciclo</div>';
        });
}

function renderNoCycle() {
    if (!CAN_WRITE) {
        return '<div class="no-cycle"><h3>Sin ciclo activo</h3><p>No hay un ciclo de cultivo iniciado. Pedile a un admin u operador que inicie uno.</p></div>';
    }
    const today = new Date().toISOString().slice(0, 10);
    return `
        <div class="no-cycle">
            <h3>Sin ciclo activo</h3>
            <p>Inicia un ciclo nuevo para empezar a registrar eventos y recibir recordatorios.</p>
            <div class="no-cycle-form">
                <div>
                    <label class="form-label">Fecha de inicio</label>
                    <input type="date" class="form-input" id="nc-date" value="${today}">
                </div>
                <div>
                    <label class="form-label">Etapa inicial</label>
                    <select class="form-select" id="nc-stage">
                        <option value="germinacion">Germinacion</option>
                        <option value="plantula">Plantula</option>
                        <option value="vegetativo_temprano" selected>Vegetativo Temprano</option>
                        <option value="vegetativo_tardio">Vegetativo Tardio</option>
                        <option value="pre_floracion">Pre-Floracion</option>
                        <option value="floracion">Floracion</option>
                        <option value="floracion_tardia">Floracion Tardia</option>
                        <option value="secado">Secado</option>
                        <option value="curado">Curado</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="startCycle()">Iniciar ciclo</button>
            </div>
        </div>
    `;
}

function startCycle() {
    const date = document.getElementById('nc-date').value;
    const stage = document.getElementById('nc-stage').value;
    if (!date) { showToast('Selecciona una fecha', 'error'); return; }
    fetch('/api/cycle', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({start_date: date, current_stage: stage}),
    })
    .then(r => r.json())
    .then(res => {
        if (res.ok) { showToast('Ciclo iniciado', 'success'); loadCycle(); }
        else showToast(res.error || 'Error', 'error');
    });
}

function endCycle() {
    if (!confirm('¿Terminar el ciclo activo? Esta accion lo marca como cerrado y permite iniciar uno nuevo.')) return;
    fetch('/api/cycle/end', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}'})
    .then(r => r.json()).then(res => {
        if (res.ok) { showToast('Ciclo cerrado', 'success'); loadCycle(); }
        else showToast(res.error || 'Error', 'error');
    });
}

function wireNoCycle() { /* nothing extra */ }

function renderActiveCycle(d) {
    const cycle = d.cycle;
    const stageLabel = (cycle.current_stage || '').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    const remaining = d.days_remaining_in_stage;
    const due = d.transition_due;
    const progPct = d.stage_duration ? Math.min(100, (d.days_in_stage / d.stage_duration) * 100) : 0;

    let actionHtml = '';
    if (CAN_WRITE) {
        if (due && d.next_stage) {
            const nextLabel = d.next_stage.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            actionHtml = `
                <div class="cycle-action-due">
                    Tu fase termino. ¿Avanzar a <strong>${nextLabel}</strong>?
                </div>
                <button class="btn-primary" onclick="advanceStage()">Avanzar fase</button>
                <button class="btn-secondary" onclick="endCycle()">Terminar ciclo</button>
            `;
        } else {
            actionHtml = `
                <button class="btn-secondary" onclick="advanceStage()">Avanzar fase manualmente</button>
                <button class="btn-secondary" onclick="endCycle()">Terminar ciclo</button>
            `;
        }
    }

    let timelineHtml = '<div class="stage-timeline">';
    for (const s of d.stages_plan) {
        const cls = s.is_current ? 'current' : (s.is_past ? 'past' : '');
        const sLabel = s.stage.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        timelineHtml += `
            <div class="stage-block ${cls}">
                <div class="stage-block-name">${sLabel}</div>
                <div class="stage-block-meta">${s.days || '--'} dias</div>
                <div class="stage-block-dates">${s.starts}${s.ends ? ' → ' + s.ends : ''}</div>
            </div>
        `;
    }
    timelineHtml += '</div>';

    const eventTypeOptions = Object.entries(TYPE_LABELS)
        .map(([k, v]) => `<option value="${k}">${v}</option>`).join('');
    const today = new Date().toISOString().slice(0, 10);
    const quickAddHtml = CAN_WRITE ? `
        <div class="event-add">
            <div>
                <label class="form-label">Fecha</label>
                <input type="date" class="form-input" id="ev-date" value="${today}">
            </div>
            <div>
                <label class="form-label">Tipo</label>
                <select class="form-select" id="ev-type">${eventTypeOptions}</select>
            </div>
            <div class="event-add-notes">
                <label class="form-label">Notas (opcional)</label>
                <input type="text" class="form-input" id="ev-notes" placeholder="ej: Bloom 5ml/L">
            </div>
            <div class="event-add-submit">
                <button class="btn-primary" onclick="addEvent()">Agregar evento</button>
            </div>
        </div>
    ` : '';

    return `
        <section class="section">
            <div class="cycle-hero">
                <div class="cycle-hero-main">
                    <div class="cycle-hero-day">Dia ${d.day_of_cycle} del ciclo</div>
                    <div class="cycle-hero-stage">${stageLabel}</div>
                    <div class="cycle-hero-desc">${d.stage_info || ''}</div>
                    <div class="cycle-hero-progress">
                        <div class="cycle-hero-progress-fill ${due ? 'due' : ''}" style="width: ${progPct}%"></div>
                    </div>
                    <div class="cycle-hero-progress-meta">
                        <span>Inicio fase: ${cycle.stage_started_at}</span>
                        <span>${d.days_in_stage} / ${d.stage_duration || '--'} dias</span>
                    </div>
                </div>
                <div class="cycle-hero-actions">${actionHtml}</div>
            </div>
        </section>

        <section class="section">
            <div class="section-head">
                <div class="section-title">Timeline de fases</div>
            </div>
            ${timelineHtml}
        </section>

        ${quickAddHtml ? `<section class="section">
            <div class="section-head"><div class="section-title">Registrar evento</div></div>
            ${quickAddHtml}
        </section>` : ''}

        ${CAN_WRITE ? `<section class="section">
            <div class="section-head"><div class="section-title">Riego / Abono — bitacora</div></div>
            <div class="event-add feed-add">
                <div><label class="form-label">Fecha</label><input type="date" class="form-input" id="feed-date" value="${today}"></div>
                <div><label class="form-label">Litros</label><input type="number" step="0.1" class="form-input" id="feed-liters" placeholder="ej: 5"></div>
                <div><label class="form-label">EC entrada</label><input type="number" step="0.01" class="form-input" id="feed-ec-in" placeholder="1.6"></div>
                <div><label class="form-label">pH entrada</label><input type="number" step="0.01" class="form-input" id="feed-ph-in" placeholder="5.8"></div>
                <div><label class="form-label">EC runoff</label><input type="number" step="0.01" class="form-input" id="feed-ec-out" placeholder="1.4"></div>
                <div><label class="form-label">pH runoff</label><input type="number" step="0.01" class="form-input" id="feed-ph-out" placeholder="6.0"></div>
            </div>
            <div class="feed-products" id="feed-products">
                <div class="feed-product-row">
                    <input type="text" class="form-input" placeholder="Producto (ej: BloomA)" data-feed-name>
                    <input type="number" step="0.1" class="form-input" placeholder="ml" data-feed-ml>
                </div>
                <div class="feed-product-row">
                    <input type="text" class="form-input" placeholder="Producto" data-feed-name>
                    <input type="number" step="0.1" class="form-input" placeholder="ml" data-feed-ml>
                </div>
                <div class="feed-product-row">
                    <input type="text" class="form-input" placeholder="Producto" data-feed-name>
                    <input type="number" step="0.1" class="form-input" placeholder="ml" data-feed-ml>
                </div>
            </div>
            <div class="feed-add-bottom">
                <input type="text" class="form-input" id="feed-notes" placeholder="Notas (opcional)">
                <button class="btn-primary" onclick="addFeed()">Registrar riego</button>
            </div>
        </section>

        <section class="section">
            <div class="section-head"><div class="section-title">Historico de riegos (60 dias)</div></div>
            <div class="table-wrap">
                <table class="data" id="feeds-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th style="text-align: right;">Litros</th>
                            <th style="text-align: right;">EC in</th>
                            <th style="text-align: right;">pH in</th>
                            <th style="text-align: right;">EC out</th>
                            <th style="text-align: right;">pH out</th>
                            <th>Productos</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="feeds-tbody"><tr><td colspan="8" class="text-muted" style="text-align:center;padding:24px;">Cargando...</td></tr></tbody>
                </table>
            </div>
        </section>` : ''}

        <section class="section">
            <div class="events-grid">
                <div>
                    <div class="section-head"><div class="section-title">Proximos (siguientes 30 dias)</div></div>
                    <div class="events-list" id="events-upcoming"><div class="empty-state">Cargando...</div></div>
                </div>
                <div>
                    <div class="section-head"><div class="section-title">Historico (ultimos 30 dias)</div></div>
                    <div class="events-list" id="events-past"><div class="empty-state">Cargando...</div></div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-head">
                <div class="section-title">Bitacora fotografica</div>
                ${CAN_WRITE ? '<button class="btn-secondary" onclick="takeSnapshot()" style="font-size:0.75rem;padding:6px 12px;">Tomar foto ahora</button>' : ''}
            </div>
            <div class="photos-grid" id="photos-grid"><div class="empty-state">Cargando...</div></div>
        </section>

        ${CAN_WRITE ? `<section class="section">
            <div class="section-head"><div class="section-title">Plantas del ciclo</div></div>
            <div class="event-add" style="grid-template-columns: 1fr 1fr 130px auto;">
                <div><label class="form-label">Nombre</label><input type="text" class="form-input" id="plant-name" placeholder="ej: Planta 1"></div>
                <div><label class="form-label">Strain</label><input type="text" class="form-input" id="plant-strain" placeholder="ej: Northern Lights"></div>
                <div><label class="form-label">Plantada</label><input type="date" class="form-input" id="plant-date" value="${today}"></div>
                <div style="display:flex;align-items:flex-end;"><button class="btn-primary" onclick="addPlant()">Agregar</button></div>
            </div>
            <div class="plants-list" id="plants-list" style="margin-top:12px;"></div>
        </section>` : ''}

        ${CAN_WRITE ? `<section class="section">
            <div class="section-head"><div class="section-title">Tareas recurrentes</div></div>
            <div class="event-add" style="grid-template-columns: 1.5fr 100px 100px 1fr auto;">
                <div><label class="form-label">Titulo</label><input type="text" class="form-input" id="rt-title" placeholder="ej: Revisar trichomas"></div>
                <div><label class="form-label">Cada (dias)</label><input type="number" min="1" class="form-input" id="rt-every" value="3"></div>
                <div><label class="form-label">Proxima</label><input type="date" class="form-input" id="rt-next" value="${today}"></div>
                <div><label class="form-label">Notas</label><input type="text" class="form-input" id="rt-notes" placeholder="opcional"></div>
                <div style="display:flex;align-items:flex-end;"><button class="btn-primary" onclick="addRecurring()">Agregar</button></div>
            </div>
            <div id="recurring-list" style="margin-top:12px;"></div>
        </section>` : ''}

        ${CAN_WRITE ? `<section class="section">
            <div class="section-head"><div class="section-title">Costos del ciclo</div></div>
            <div class="event-add" style="grid-template-columns: 130px 1fr 130px 1fr auto;">
                <div><label class="form-label">Fecha</label><input type="date" class="form-input" id="cost-date" value="${today}"></div>
                <div><label class="form-label">Categoria</label><select class="form-select" id="cost-cat">
                    <option value="luz">Luz</option><option value="agua">Agua</option><option value="nutrientes">Nutrientes</option>
                    <option value="sustrato">Sustrato</option><option value="genetica">Genética</option><option value="otro">Otro</option>
                </select></div>
                <div><label class="form-label">Monto</label><input type="number" step="0.01" class="form-input" id="cost-amount" placeholder="0.00"></div>
                <div><label class="form-label">Notas</label><input type="text" class="form-input" id="cost-notes" placeholder="opcional"></div>
                <div style="display:flex;align-items:flex-end;"><button class="btn-primary" onclick="addCost()">Agregar</button></div>
            </div>
            <div class="cost-summary" id="cost-summary" style="margin-top:14px;"></div>
            <div id="costs-list" style="margin-top:12px;"></div>
        </section>` : ''}

        ${CAN_WRITE ? `<section class="section">
            <div class="section-head"><div class="section-title">Cosecha (al cerrar el ciclo)</div></div>
            <div class="event-add" style="grid-template-columns: 130px 1fr 1fr 1fr auto;">
                <div><label class="form-label">Fecha</label><input type="date" class="form-input" id="harv-date" value="${today}"></div>
                <div><label class="form-label">Húmedo (g)</label><input type="number" step="0.1" class="form-input" id="harv-wet" placeholder="0"></div>
                <div><label class="form-label">Seco (g)</label><input type="number" step="0.1" class="form-input" id="harv-dry" placeholder="0"></div>
                <div><label class="form-label">Curado (g)</label><input type="number" step="0.1" class="form-input" id="harv-cured" placeholder="0"></div>
                <div style="display:flex;align-items:flex-end;"><button class="btn-primary" onclick="saveHarvest()">Guardar</button></div>
            </div>
            <div style="margin-top:10px;"><input type="text" class="form-input" id="harv-notes" placeholder="Notas de cosecha (opcional)"></div>
        </section>` : ''}
    `;
}

function wireActiveCycle() { /* delegated below */ }

function advanceStage() {
    fetch('/api/cycle/advance-stage', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}'})
        .then(r => r.json()).then(res => {
            if (res.ok) { showToast('Fase avanzada a ' + res.new_stage, 'success'); loadCycle(); }
            else showToast(res.error || 'Error', 'error');
        });
}

function addEvent() {
    const date = document.getElementById('ev-date').value;
    const type = document.getElementById('ev-type').value;
    const notes = document.getElementById('ev-notes').value;
    if (!date) { showToast('Selecciona fecha', 'error'); return; }
    fetch('/api/cycle/events', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({date, event_type: type, notes}),
    })
    .then(r => r.json()).then(res => {
        if (res.ok) {
            showToast('Evento agregado', 'success');
            document.getElementById('ev-notes').value = '';
            loadEvents();
        } else showToast(res.error || 'Error', 'error');
    });
}

function addFeed() {
    const products = [];
    document.querySelectorAll('.feed-product-row').forEach(row => {
        const name = row.querySelector('[data-feed-name]').value.trim();
        const ml = row.querySelector('[data-feed-ml]').value.trim();
        if (name) products.push({nombre: name, ml: ml ? parseFloat(ml) : null});
    });
    const payload = {
        date: document.getElementById('feed-date').value,
        liters: document.getElementById('feed-liters').value,
        ec_in: document.getElementById('feed-ec-in').value,
        ph_in: document.getElementById('feed-ph-in').value,
        ec_runoff: document.getElementById('feed-ec-out').value,
        ph_runoff: document.getElementById('feed-ph-out').value,
        notes: document.getElementById('feed-notes').value,
        products: products,
    };
    if (!payload.date) { showToast('Fecha requerida', 'error'); return; }
    fetch('/api/cycle/feeds', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
    })
    .then(r => r.json()).then(res => {
        if (res.ok) {
            showToast('Riego registrado', 'success');
            // Limpiar
            ['feed-liters','feed-ec-in','feed-ph-in','feed-ec-out','feed-ph-out','feed-notes'].forEach(id => document.getElementById(id).value = '');
            document.querySelectorAll('.feed-product-row input').forEach(i => i.value = '');
            loadFeeds();
            loadEvents(); // por si se creo un crop_event abono
        } else showToast(res.error || 'Error', 'error');
    });
}

function loadFeeds() {
    const tbody = document.getElementById('feeds-tbody');
    if (!tbody) return;
    fetch('/api/cycle/feeds?days=60')
        .then(r => r.json())
        .then(feeds => {
            if (!Array.isArray(feeds) || feeds.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-muted" style="text-align:center;padding:24px;">Sin riegos registrados</td></tr>';
                return;
            }
            tbody.innerHTML = feeds.map(f => {
                const fmt = v => v != null ? Number(v).toFixed(2) : '—';
                const productos = Array.isArray(f.products)
                    ? f.products.map(p => `${p.nombre}${p.ml ? ' ' + p.ml + 'ml' : ''}`).join(', ')
                    : (f.products || '');
                const xSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
                return `<tr>
                    <td><code style="font-family:var(--font-mono);font-size:0.78rem;">${f.date}</code></td>
                    <td style="text-align:right;font-family:var(--font-mono);">${f.liters != null ? f.liters + ' L' : '—'}</td>
                    <td style="text-align:right;font-family:var(--font-mono);">${fmt(f.ec_in)}</td>
                    <td style="text-align:right;font-family:var(--font-mono);">${fmt(f.ph_in)}</td>
                    <td style="text-align:right;font-family:var(--font-mono);color:var(--text-secondary);">${fmt(f.ec_runoff)}</td>
                    <td style="text-align:right;font-family:var(--font-mono);color:var(--text-secondary);">${fmt(f.ph_runoff)}</td>
                    <td style="font-size:0.78rem;color:var(--text-secondary);">${productos || '—'}${f.notes ? '<div style="color:var(--text-muted);font-size:0.72rem;">' + f.notes + '</div>' : ''}</td>
                    <td style="text-align:right;"><button class="event-row-actions" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);width:24px;height:24px;border-radius:var(--r-sm);cursor:pointer;" onclick="deleteFeed(${f.id})">${xSvg}</button></td>
                </tr>`;
            }).join('');
        });
}

function deleteFeed(id) {
    if (!confirm('Eliminar este registro?')) return;
    fetch('/api/cycle/feeds/' + id, {method: 'DELETE'})
        .then(r => r.json()).then(res => { if (res.ok) loadFeeds(); });
}

function loadEvents() {
    fetch('/api/cycle/events?days_past=30&days_future=30')
        .then(r => r.json())
        .then(events => {
            if (!Array.isArray(events)) return;
            const today = new Date().toISOString().slice(0, 10);
            const upcoming = events.filter(e => e.date >= today);
            const past = events.filter(e => e.date < today).reverse();
            document.getElementById('events-upcoming').innerHTML =
                upcoming.length ? upcoming.map(renderEventRow).join('')
                                : '<div class="empty-state">Sin eventos proximos</div>';
            document.getElementById('events-past').innerHTML =
                past.length ? past.map(renderEventRow).join('')
                            : '<div class="empty-state">Sin eventos previos</div>';
        });
}

function renderEventRow(ev) {
    const today = new Date().toISOString().slice(0, 10);
    const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0, 10);
    let timeClass = 'upcoming';
    if (ev.date < today) timeClass = 'past';
    else if (ev.date === today) timeClass = 'today';
    else if (ev.date === tomorrow) timeClass = 'tomorrow';

    const typeLabel = TYPE_LABELS[ev.event_type] || ev.event_type;
    const completedClass = ev.completed ? 'completed' : '';
    const dateLabel = formatEventDate(ev.date, today, tomorrow);

    let actions = '';
    if (CAN_WRITE) {
        const checkSvg = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>';
        const undoSvg  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>';
        const xSvg     = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        actions = `
            <button title="${ev.completed ? 'Marcar pendiente' : 'Marcar hecho'}" onclick="toggleComplete(${ev.id}, ${!ev.completed})">
                ${ev.completed ? undoSvg : checkSvg}
            </button>
            <button class="danger" title="Eliminar" onclick="deleteEvent(${ev.id})">${xSvg}</button>
        `;
    }

    return `
        <div class="event-row ${timeClass} type-${ev.event_type} ${completedClass}">
            <div class="event-row-date">${dateLabel}</div>
            <div class="event-row-content">
                <div class="event-row-type">${typeLabel}</div>
                <div class="event-row-notes" title="${(ev.notes || '').replace(/"/g, '&quot;')}">${ev.notes || ''}</div>
            </div>
            <div class="event-row-actions">${actions}</div>
        </div>
    `;
}

function formatEventDate(d, today, tomorrow) {
    if (d === today) return 'HOY';
    if (d === tomorrow) return 'MANANA';
    // Format as DD MMM
    const date = new Date(d + 'T00:00:00');
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return String(date.getDate()).padStart(2, '0') + ' ' + months[date.getMonth()];
}

function toggleComplete(id, completed) {
    fetch(`/api/cycle/events/${id}/complete`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({completed}),
    }).then(r => r.json()).then(res => {
        if (res.ok) loadEvents();
    });
}

function deleteEvent(id) {
    if (!confirm('Eliminar este evento?')) return;
    fetch(`/api/cycle/events/${id}`, {method: 'DELETE'})
        .then(r => r.json()).then(res => { if (res.ok) loadEvents(); });
}

// ============= Photos =============
function loadPhotos() {
    fetch('/api/cycle/photos').then(r=>r.json()).then(photos => {
        const g = document.getElementById('photos-grid');
        if (!g) return;
        if (!photos.length) { g.innerHTML = '<div class="empty-state">Sin fotos. Tomá la primera con el boton de arriba.</div>'; return; }
        g.innerHTML = photos.map(p => {
            const stage = (p.stage_at_capture || '').replace(/_/g, ' ');
            const delBtn = CAN_WRITE
                ? `<button class="photo-del" onclick="deletePhoto(${p.id})" title="Eliminar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`
                : '';
            return `<div class="photo-card">
                <a href="/api/camera/image/${p.filename}" target="_blank">
                    <img src="/api/camera/image/${p.filename}" alt="${p.date}" loading="lazy">
                </a>
                <div class="photo-meta">
                    <code>${p.date}</code>
                    <span>${stage}</span>
                </div>
                ${delBtn}
            </div>`;
        }).join('');
    });
}
function takeSnapshot() {
    showToast('Tomando foto...', 'success');
    fetch('/api/cycle/photos/snapshot', {method:'POST', body: '{}', headers:{'Content-Type':'application/json'}})
        .then(r=>r.json()).then(res => {
            if (res.ok) { showToast('Foto guardada', 'success'); loadPhotos(); }
            else showToast(res.error || 'Error al tomar foto', 'error');
        });
}
function deletePhoto(id) {
    if (!confirm('Eliminar esta foto?')) return;
    fetch('/api/cycle/photos/' + id, {method:'DELETE'}).then(r=>r.json()).then(res => { if (res.ok) loadPhotos(); });
}

        if (!plants.length) { c.innerHTML = '<div class="empty-state" style="padding:16px 0;">Sin plantas registradas</div>'; return; }
        c.innerHTML = plants.map(p => {
            const xSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

function addPlant() {

        planted_date: document.getElementById('plant-date').value,
    };

            if (res.ok) { showToast('Planta agregada', 'success');
                document.getElementById('plant-name').value = '';
                document.getElementById('plant-strain').value = '';

function deletePlant(id) {
    if (!confirm('Eliminar esta planta?')) return;
    fetch('/api/cycle/plants/' + id, {method:'DELETE'}).then(r=>r.json()).then(res => { if (res.ok) loadPlants(); });
}

// ============= Recurring tasks =============
function loadRecurring() {
    const c = document.getElementById('recurring-list');
    if (!c) return;
    fetch('/api/recurring-tasks').then(r=>r.json()).then(tasks => {
        if (!tasks.length) { c.innerHTML = '<div class="empty-state" style="padding:16px 0;">Sin tareas recurrentes</div>'; return; }
        c.innerHTML = tasks.map(t => {
            const xSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
            const cadence = t.every_days ? `cada ${t.every_days}d` : 'manual';
            return `<div class="plant-row">
                <strong>${t.title}</strong>
                <span class="text-muted" style="font-size:0.78rem;">${cadence}</span>
                <code style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);">próxima: ${t.next_run}</code>
                <button onclick="deleteRecurring(${t.id})" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);width:24px;height:24px;border-radius:var(--r-sm);cursor:pointer;">${xSvg}</button>
            </div>`;
        }).join('');
    });
}
function addRecurring() {
    const payload = {
        title: document.getElementById('rt-title').value.trim(),
        every_days: document.getElementById('rt-every').value,
        next_run: document.getElementById('rt-next').value,
        description: document.getElementById('rt-notes').value,
        scope: 'cycle',
    };
    if (!payload.title || !payload.next_run) { showToast('Titulo y proxima fecha requeridos', 'error'); return; }
    fetch('/api/recurring-tasks', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)})
        .then(r=>r.json()).then(res => {
            if (res.ok) { showToast('Tarea agregada', 'success');
                document.getElementById('rt-title').value = '';
                document.getElementById('rt-notes').value = '';
                loadRecurring();
            } else showToast(res.error||'Error', 'error');
        });
}
function deleteRecurring(id) {
    if (!confirm('Eliminar esta tarea?')) return;
    fetch('/api/recurring-tasks/' + id, {method:'DELETE'}).then(r=>r.json()).then(res => { if (res.ok) loadRecurring(); });
}

// ============= Costs =============
function loadCosts() {
    const list = document.getElementById('costs-list');
    const summary = document.getElementById('cost-summary');
    if (!list) return;
    fetch('/api/cycle/costs').then(r=>r.json()).then(data => {
        const items = data.items || [];
        const sum = data.summary || {by_category: {}, total: 0};
        // Summary chips
        const cats = Object.entries(sum.by_category || {});
        if (summary) {
            summary.innerHTML = cats.length
                ? `<div class="cost-summary-row">
                    ${cats.map(([k,v]) => `<span class="cost-chip"><span class="text-muted">${k}</span> $${Number(v).toLocaleString()}</span>`).join('')}
                    <span class="cost-chip total"><span class="text-muted">TOTAL</span> $${Number(sum.total).toLocaleString()}</span>
                  </div>`
                : '';
        }
        // List
        if (!items.length) { list.innerHTML = '<div class="empty-state" style="padding:16px 0;">Sin costos registrados</div>'; return; }
        list.innerHTML = '<div style="display:grid;grid-template-columns:100px 120px 1fr 120px auto;gap:8px;padding:6px 0;font-size:0.78rem;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);"><div>Fecha</div><div>Categoria</div><div>Notas</div><div style="text-align:right;">Monto</div><div></div></div>' + items.map(c => {
            const xSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
            return `<div style="display:grid;grid-template-columns:100px 120px 1fr 120px auto;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);align-items:center;">
                <code style="font-family:var(--font-mono);font-size:0.72rem;">${c.date}</code>
                <span>${c.category}</span>
                <span class="text-muted" style="font-size:0.78rem;">${c.notes || ''}</span>
                <span style="text-align:right;font-family:var(--font-mono);font-weight:500;">$${Number(c.amount).toLocaleString()}</span>
                <button onclick="deleteCost(${c.id})" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);width:24px;height:24px;border-radius:var(--r-sm);cursor:pointer;">${xSvg}</button>
            </div>`;
        }).join('');
    });
}
function addCost() {
    const payload = {
        date: document.getElementById('cost-date').value,
        category: document.getElementById('cost-cat').value,
        amount: document.getElementById('cost-amount').value,
        notes: document.getElementById('cost-notes').value,
    };
    if (!payload.date || !payload.amount) { showToast('Fecha y monto requeridos', 'error'); return; }
    fetch('/api/cycle/costs', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)})
        .then(r=>r.json()).then(res => {
            if (res.ok) { showToast('Costo registrado', 'success');
                document.getElementById('cost-amount').value = '';
                document.getElementById('cost-notes').value = '';
                loadCosts();
            } else showToast(res.error||'Error', 'error');
        });
}
function deleteCost(id) {
    if (!confirm('Eliminar este costo?')) return;
    fetch('/api/cycle/costs/' + id, {method:'DELETE'}).then(r=>r.json()).then(res => { if (res.ok) loadCosts(); });
}

function saveHarvest() {
    const payload = {
        harvest_date: document.getElementById('harv-date').value,
        harvest_wet_g: document.getElementById('harv-wet').value,
        harvest_dry_g: document.getElementById('harv-dry').value,
        harvest_cured_g: document.getElementById('harv-cured').value,
        harvest_notes: document.getElementById('harv-notes').value,
    };
    fetch('/api/cycle/harvest', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)})
        .then(r=>r.json()).then(res => {
            if (res.ok) showToast('Cosecha guardada', 'success');
            else showToast(res.error||'Error', 'error');
        });
}

function showToast(message, type) {
    type = type || 'success';
    const c = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = '<span>' + message + '</span>';
    c.appendChild(t);
    setTimeout(() => { t.style.animation = 'toast-out 0.25s forwards'; setTimeout(() => t.remove(), 250); }, 3500);
}
