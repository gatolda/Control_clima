<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Climatico - Invernadero</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/@bernii/gauge.js/dist/gauge.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <header>
        <h1>Control Climatico - Invernadero</h1>
        <div class="status-bar">
            <span id="connection-status" class="status-dot disconnected"></span>
            <span id="connection-text">Desconectado</span>
        </div>
    </header>

    <main>
        <!-- Seccion Sensores -->
        <section class="section">
            <h2>Sensores</h2>
            <div class="sensors-grid">
                <div class="sensor-card">
                    <h3>Temperatura</h3>
                    <canvas id="tempGauge"></canvas>
                    <div class="sensor-value">
                        <span id="tempValue">--</span>
                        <span class="unit">C</span>
                    </div>
                </div>
                <div class="sensor-card">
                    <h3>Humedad</h3>
                    <canvas id="humGauge"></canvas>
                    <div class="sensor-value">
                        <span id="humValue">--</span>
                        <span class="unit">%</span>
                    </div>
                </div>
                <div class="sensor-card">
                    <h3>CO2</h3>
                    <canvas id="co2Gauge"></canvas>
                    <div class="sensor-value">
                        <span id="co2Value">--</span>
                        <span class="unit">ppm</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Seccion Actuadores -->
        <section class="section">
            <h2>Actuadores</h2>
            <div class="actuators-grid">
                {% for nombre in actuadores %}
                <div class="actuator-card" id="card-{{ nombre }}">
                    <div class="actuator-icon" id="icon-{{ nombre }}"></div>
                    <h3>{{ nombre.replace('_', ' ').title() }}</h3>
                    <span class="actuator-state" id="state-{{ nombre }}">OFF</span>
                    <div class="actuator-buttons">
                        <button class="btn-on" onclick="toggleActuador('{{ nombre }}', 'on')">ON</button>
                        <button class="btn-off" onclick="toggleActuador('{{ nombre }}', 'off')">OFF</button>
                    </div>
                </div>
                {% endfor %}
            </div>
        </section>
    </main>

    <script>
        // --- Socket.IO ---
        const socket = io();

        socket.on('connect', function() {
            document.getElementById('connection-status').className = 'status-dot connected';
            document.getElementById('connection-text').textContent = 'Conectado';
        });

        socket.on('disconnect', function() {
            document.getElementById('connection-status').className = 'status-dot disconnected';
            document.getElementById('connection-text').textContent = 'Desconectado';
        });

        // --- Gauges ---
        const gaugeOpts = {
            angle: 0.15,
            lineWidth: 0.3,
            radiusScale: 0.9,
            pointer: { length: 0.5, strokeWidth: 0.035, color: '#ffffff' },
            limitMax: true,
            limitMin: true,
            highDpiSupport: true,
            renderTicks: { divisions: 5, divWidth: 1, divLength: 0.5, divColor: '#666' }
        };

        const tempGauge = new Gauge(document.getElementById('tempGauge')).setOptions({
            ...gaugeOpts,
            staticZones: [
                {strokeStyle: '#3498db', min: 0, max: 15},
                {strokeStyle: '#2ecc71', min: 15, max: 20},
                {strokeStyle: '#27ae60', min: 20, max: 26},
                {strokeStyle: '#f39c12', min: 26, max: 32},
                {strokeStyle: '#e74c3c', min: 32, max: 50}
            ],
            staticLabels: { font: '11px sans-serif', labels: [0, 10, 20, 30, 40, 50], color: '#aaa' }
        });
        tempGauge.maxValue = 50;
        tempGauge.setMinValue(0);
        tempGauge.animationSpeed = 20;
        tempGauge.set(0);

        const humGauge = new Gauge(document.getElementById('humGauge')).setOptions({
            ...gaugeOpts,
            staticZones: [
                {strokeStyle: '#e74c3c', min: 0, max: 30},
                {strokeStyle: '#f39c12', min: 30, max: 50},
                {strokeStyle: '#27ae60', min: 50, max: 70},
                {strokeStyle: '#f39c12', min: 70, max: 85},
                {strokeStyle: '#e74c3c', min: 85, max: 100}
            ],
            staticLabels: { font: '11px sans-serif', labels: [0, 25, 50, 75, 100], color: '#aaa' }
        });
        humGauge.maxValue = 100;
        humGauge.setMinValue(0);
        humGauge.animationSpeed = 20;
        humGauge.set(0);

        const co2Gauge = new Gauge(document.getElementById('co2Gauge')).setOptions({
            ...gaugeOpts,
            staticZones: [
                {strokeStyle: '#27ae60', min: 0, max: 800},
                {strokeStyle: '#f39c12', min: 800, max: 1200},
                {strokeStyle: '#e74c3c', min: 1200, max: 2000}
            ],
            staticLabels: { font: '11px sans-serif', labels: [0, 400, 800, 1200, 2000], color: '#aaa' }
        });
        co2Gauge.maxValue = 2000;
        co2Gauge.setMinValue(0);
        co2Gauge.animationSpeed = 20;
        co2Gauge.set(0);

        // --- Recibir datos de sensores ---
        socket.on('sensor_data', function(data) {
            if (data.temperatura_humedad) {
                const temp = data.temperatura_humedad.temperature;
                const hum = data.temperatura_humedad.humidity;
                if (temp !== null && temp !== undefined) {
                    tempGauge.set(temp);
                    document.getElementById('tempValue').textContent = temp.toFixed(1);
                }
                if (hum !== null && hum !== undefined) {
                    humGauge.set(hum);
                    document.getElementById('humValue').textContent = hum.toFixed(1);
                }
            }
            if (data.co2) {
                const co2val = data.co2.co2;
                if (co2val !== null && co2val !== undefined) {
                    co2Gauge.set(co2val);
                    document.getElementById('co2Value').textContent = Math.round(co2val);
                }
            }
        });

        // --- Recibir estado de actuadores ---
        socket.on('actuator_status', function(estados) {
            for (const [nombre, activo] of Object.entries(estados)) {
                const card = document.getElementById('card-' + nombre);
                const state = document.getElementById('state-' + nombre);
                if (card) {
                    if (activo) {
                        card.classList.add('active');
                        state.textContent = 'ON';
                    } else {
                        card.classList.remove('active');
                        state.textContent = 'OFF';
                    }
                }
            }
        });

        // --- Enviar comando a actuador ---
        function toggleActuador(nombre, accion) {
            socket.emit('toggle_actuador', { nombre: nombre, accion: accion });
        }
    </script>
</body>
</html>
