<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso — Control Climatico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
    <meta name="theme-color" content="#0C100E">
    <script>
        (function() {
            const t = localStorage.getItem('theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>
<div class="login-wrap">
    <div class="login-card fade-in">
        <div class="login-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
        </div>
        <div class="login-title">Control Climatico</div>
        <div class="login-subtitle">Invernadero</div>

        <div style="height: 22px;"></div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form class="login-form" method="POST" action="/login">
            <input type="text" name="username" class="form-input" placeholder="Usuario" required autofocus>
            <input type="password" name="password" class="form-input" placeholder="Contrasena" required>
            <button type="submit" class="btn-primary login-btn">Ingresar</button>
        </form>
    </div>
</div>
</body>
</html>
