<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Control Climatico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 40px 32px;
            text-align: center;
        }
        .login-logo {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--green), #2a9d6e);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 24px rgba(72, 210, 143, 0.25);
        }
        .login-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .login-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-bottom: 28px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .login-form .form-input {
            text-align: center;
            padding: 12px 16px;
            font-size: 0.9rem;
        }
        .login-btn {
            margin-top: 6px;
            padding: 12px;
            width: 100%;
        }
        .login-error {
            background: var(--red-dim);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: var(--red);
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 0.82rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="card login-card fade-in">
        <div class="login-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
        </div>
        <div class="login-title">Control Climatico</div>
        <div class="login-subtitle">Invernadero</div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form class="login-form" method="POST" action="/login">
            <input type="text" name="username" class="form-input" placeholder="Usuario" required autofocus>
            <input type="password" name="password" class="form-input" placeholder="Contrasenya" required>
            <button type="submit" class="btn-primary login-btn">Ingresar</button>
        </form>
    </div>
</div>
</body>
</html>
